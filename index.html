<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 1. 彻底隐藏绿字：标题和描述设为空 -->
    <meta property="og:title" content="ㅤ">
    <meta property="og:description" content="ㅤ">
    
    <!-- 2. 核心：使用 100% 能抓到的大图链接 -->
    <meta property="og:image" content="https://img.jt.org">
    <meta property="og:image:width" content="1280">
    <meta property="og:image:height" content="720">
    <meta property="og:type" content="video.other">
    <meta name="twitter:card" content="summary_large_image">

    <title>ㅤ</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #prankImage { width: 100%; height: 100%; object-fit: cover; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body onclick="startPrank()">
    <!-- 网页里显示的诱饵图 -->
    <img src="https://img.jt.org" id="prankImage">

    <audio id="prankSound" loop>
        <source src="https://www.soundjay.com" type="audio/mpeg">
    </audio>

    <script>
        var isDone = false;
        function startPrank() {
            if (isDone) return;
            isDone = true;
            document.getElementById('prankSound').play();
            if (navigator.vibrate) { navigator.vibrate(); }
            setTimeout(function() {
                alert("😜 嘿嘿！被利友整到了吧！");
            }, 100);
        }
    </script>
</body>
</html>
