<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正在加载高清猫咪视频...</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        /* 自动抓取的高清猫咪封面 */
        #cover { width: 100%; height: 100%; object-fit: contain; cursor: pointer; }
        /* 惊吓鬼脸层 */
        #scary { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 100; }
        /* 伪装播放按钮 */
        #play-btn { position: absolute; width: 80px; opacity: 0.8; pointer-events: none; }
    </style>
</head>
<body onclick="start()">
    <!-- 自动在线素材：萌猫 + 播放键 -->
    <img id="cover" src="https://images.pexels.com">
    <img id="play-btn" src="https://cdn-icons-png.flaticon.com">

    <!-- 惊吓层 -->
    <img id="scary" src="https://media.giphy.com">
    <audio id="audio" src="https://www.myinstants.com"></audio>

    <script>
        function start() {
            const a = document.getElementById('audio');
            const s = document.getElementById('scary');
            const c = document.getElementById('cover');
            const b = document.getElementById('play-btn');

            // 1. 瞬间切换：猫咪消失，鬼脸出现
            c.style.display = 'none';
            b.style.display = 'none';
            s.style.display = 'block';
            
            // 2. 爆发最高分贝尖叫
            a.play();
            
            // 3. 手机震动
            if (navigator.vibrate) navigator.vibrate(500);

            // 4. 2.5秒后（吓完）自动跳转 4399
            setTimeout(() => {
                window.location.href = "https://www.4399.com";
            }, 2500);
        }
    </script>
</body>
</html>
